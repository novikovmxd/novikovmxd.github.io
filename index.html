<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Возврат средств</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #1c2026);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #252b32);
            --text: var(--tg-theme-text-color, #f5f5f5);
            --hint: var(--tg-theme-hint-color, #6c7278);
            --button: var(--tg-theme-button-color, #3fc1b0);
            --button-text: var(--tg-theme-button-text-color, #ffffff);
            --section-separator: var(--tg-theme-section-separator-color, #1c2026);
            --subtitle: var(--tg-theme-subtitle-text-color, #6c7278);
            --bad: #e5534b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        .app {
            max-width: 480px;
            margin: 0 auto;
            padding-bottom: max(24px, env(safe-area-inset-bottom));
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 20px 24px;
            text-align: center;
            animation: fadeIn 0.3s ease both;
        }

        .header-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--button), color-mix(in srgb, var(--button) 60%, #000));
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.35);
        }

        .header-icon svg {
            width: 34px;
            height: 34px;
            color: var(--button-text);
        }

        .header-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
            letter-spacing: -0.3px;
        }

        .header-meta {
            font-size: 14px;
            color: var(--hint);
        }

        .header-meta span {
            color: var(--button);
            font-weight: 500;
        }

        /* ===== DIVIDER ===== */
        .divider {
            height: 1px;
            background: var(--section-separator);
            margin: 0 20px;
        }

        /* ===== XTR NOTE ===== */
        .xtr-note {
            padding: 20px 20px 8px;
            text-align: center;
            font-size: 15px;
            color: var(--subtitle);
            line-height: 1.6;
            animation: fadeIn 0.3s ease 0.06s both;
        }

        /* ===== FORM ===== */
        .form-section {
            padding: 8px 0 0;
            animation: fadeIn 0.3s ease 0.08s both;
        }

        .section-header {
            font-size: 13px;
            font-weight: 600;
            color: var(--hint);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 16px 20px 8px;
        }

        .fields-block {
            background: var(--secondary-bg);
        }

        .field-row {
            display: flex;
            align-items: center;
            padding: 0 20px;
            min-height: 52px;
            border-bottom: 1px solid var(--section-separator);
            transition: background 0.15s;
        }

        .field-row:last-child {
            border-bottom: none;
        }

        .field-row.has-error {
            background: rgba(229, 83, 75, 0.06);
        }

        .field-input {
            flex: 1;
            padding: 14px 0;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-size: 16px;
            font-family: inherit;
            -webkit-tap-highlight-color: transparent;
        }

        .field-input::placeholder {
            color: var(--hint);
            font-size: 15px;
        }

        .error-inline {
            font-size: 12px;
            color: var(--bad);
            padding: 0 20px 10px;
            display: none;
            align-items: center;
            gap: 5px;
            background: var(--secondary-bg);
        }

        .error-inline.show {
            display: flex;
            animation: fadeIn 0.2s ease both;
        }

        .error-inline::before {
            content: '⚠';
            font-size: 12px;
            flex-shrink: 0;
        }

        /* ===== SUBMIT ===== */
        .submit-wrap {
            padding: 24px 20px 0;
            animation: fadeIn 0.3s ease 0.14s both;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--button);
            color: var(--button-text);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.12s, opacity 0.12s;
            -webkit-tap-highlight-color: transparent;
            letter-spacing: -0.1px;
        }

        .submit-btn:active  { transform: scale(0.97); opacity: 0.85; }
        .submit-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

        /* ===== SUCCESS OVERLAY ===== */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px 24px;
            text-align: center;
            z-index: 100;
        }

        .overlay.visible {
            display: flex;
            animation: fadeIn 0.3s ease both;
        }

        .overlay-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4dd87a, #2ea84f);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.5); }
            to   { opacity: 1; transform: scale(1); }
        }

        .overlay-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--text);
            letter-spacing: -0.3px;
        }

        .overlay-text {
            font-size: 15px;
            color: var(--subtitle);
            line-height: 1.6;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }
    </style>
</head>
<body>
    <div class="app" id="app"></div>

    <div class="overlay" id="successOverlay">
        <div class="overlay-icon">✅</div>
        <div class="overlay-title">Заявка отправлена</div>
        <div class="overlay-text">Заявка принята.<br>Среднее время обработки — до 24 часов.</div>
    </div>

    <script>
    (function() {
        const CURRENCY_XTR = 'XTR';

        function escapeHtml(str) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
            return str.replace(/[&<>"']/g, c => map[c]);
        }

        const tg = window.Telegram && window.Telegram.WebApp;

        if (tg) {
            tg.ready();
            tg.expand();
            tg.setHeaderColor('secondary_bg_color');
            tg.setBackgroundColor('bg_color');
        }

        function haptic(type) {
            if (tg && tg.HapticFeedback) {
                if (type === 'error')   tg.HapticFeedback.notificationOccurred('error');
                if (type === 'success') tg.HapticFeedback.notificationOccurred('success');
            }
        }

        const params   = new URLSearchParams(window.location.search);
        const currency = params.get('currency') || '';
        const orderId  = params.get('order_id') || '';
        const isXtr    = currency === CURRENCY_XTR;

        const safeOrderId   = escapeHtml(orderId);
        const currencyLabel = isXtr ? '⭐ Telegram Stars' : escapeHtml(currency || 'RUB');

        const HEADER_ICON = `<svg viewBox="0 0 24 24" fill="none"><path d="M12 4v3m0 0L8.5 10.5M12 7l3.5 3.5M5 13h14a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

        document.getElementById('app').innerHTML = `
            <div class="header">
                <div class="header-icon">${HEADER_ICON}</div>
                <div class="header-title">Оформление возврата</div>
                <div class="header-meta">Заказ <span>#${safeOrderId}</span> &middot; ${currencyLabel}</div>
            </div>

            <div class="divider"></div>

            ${isXtr ? `
                <div class="xtr-note">
                    Платёж был произведён в Telegram Stars.<br>
                    Нажмите кнопку ниже, чтобы подать заявку.
                </div>
                <div class="submit-wrap">
                    <button class="submit-btn" id="submitBtn">Подать заявку на возврат</button>
                </div>
            ` : `
                <div class="form-section">
                    <div class="section-header">Реквизиты для возврата</div>
                    <div class="fields-block">
                        <div class="field-row" id="reqGroup">
                            <input class="field-input" id="requisites" type="text"
                                placeholder="Номер карты или телефон СБП"
                                aria-label="Номер карты или телефон СБП"
                                inputmode="text" autocomplete="off" />
                        </div>
                        <div class="error-inline" id="reqError"><span>Введите номер карты или СБП</span></div>
                        <div class="field-row" id="bankGroup">
                            <input class="field-input" id="bank" type="text"
                                placeholder="Название банка"
                                aria-label="Название банка"
                                autocomplete="off" />
                        </div>
                        <div class="error-inline" id="bankError"><span>Введите название банка</span></div>
                    </div>
                </div>
                <div class="submit-wrap">
                    <button class="submit-btn" id="submitBtn">Отправить заявку</button>
                </div>
            `}
        `;

        document.getElementById('submitBtn').addEventListener('click', function () {
            const btn = this;
            const originalText = btn.textContent;

            if (!isXtr) {
                const req       = document.getElementById('requisites').value.trim();
                const bnk       = document.getElementById('bank').value.trim();
                const reqErr    = document.getElementById('reqError');
                const bankErr   = document.getElementById('bankError');
                const reqGroup  = document.getElementById('reqGroup');
                const bankGroup = document.getElementById('bankGroup');
                let valid = true;

                const stripped = req.replace(/[\s\-]/g, '');
                const isCard  = /^\d{16,19}$/.test(stripped);
                const isPhone = /^\+7\d{10}$/.test(req.replace(/[\s\-()]/g, ''));

                function setError(group, msgEl, text) {
                    msgEl.querySelector('span').textContent = text;
                    msgEl.classList.add('show');
                    group.classList.add('has-error');
                }
                function clearError(group, msgEl) {
                    msgEl.classList.remove('show');
                    group.classList.remove('has-error');
                }

                if (!req) {
                    setError(reqGroup, reqErr, 'Введите номер карты или СБП');
                    valid = false;
                } else if (!isCard && !isPhone) {
                    setError(reqGroup, reqErr, 'Номер карты (16–19 цифр) или телефон СБП (+7...)');
                    valid = false;
                } else {
                    clearError(reqGroup, reqErr);
                }

                if (!bnk) {
                    setError(bankGroup, bankErr, 'Введите название банка');
                    valid = false;
                } else {
                    clearError(bankGroup, bankErr);
                }

                if (!valid) { haptic('error'); return; }

                try {
                    tg.sendData(JSON.stringify({ order_id: orderId, currency, requisites: req, bank: bnk }));
                } catch (e) {
                    haptic('error');
                    btn.textContent = 'Ошибка. Попробуйте ещё раз.';
                    setTimeout(() => { btn.textContent = originalText; }, 2000);
                    return;
                }
            } else {
                try {
                    tg.sendData(JSON.stringify({ order_id: orderId, currency: CURRENCY_XTR }));
                } catch (e) {
                    haptic('error');
                    btn.textContent = 'Ошибка. Попробуйте ещё раз.';
                    setTimeout(() => { btn.textContent = originalText; }, 2000);
                    return;
                }
            }

            btn.disabled = true;
            btn.textContent = 'Отправка...';
            haptic('success');
            document.getElementById('successOverlay').classList.add('visible');
            setTimeout(() => { if (tg && tg.close) tg.close(); }, 2500);
        });
    })();
    </script>
</body>
</html>
