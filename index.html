<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Возврат средств</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #282e33);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #313b43);
            --text: var(--tg-theme-text-color, #f5f5f5);
            --hint: var(--tg-theme-hint-color, #82868a);
            --link: var(--tg-theme-link-color, #4be1c3);
            --accent: var(--tg-theme-accent-text-color, #79e8da);
            --button: var(--tg-theme-button-color, #3fc1b0);
            --button-text: var(--tg-theme-button-text-color, #ffffff);
            --section-separator: var(--tg-theme-section-separator-color, #242a2e);
            --header-bg: var(--tg-theme-header-bg-color, #282e33);
            --section-bg: var(--tg-theme-section-bg-color, #282e33);
            --subtitle: var(--tg-theme-subtitle-text-color, #82868a);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
        }

        .app {
            max-width: 480px;
            margin: 0 auto;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ===== HEADER ===== */
        .header-widget {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 16px 28px;
            text-align: center;
            background: var(--secondary-bg);
            animation: fadeInUp 0.3s ease both;
        }

        .header-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 14px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.25);
        }

        .icon-rub  { background: linear-gradient(135deg, #53edd6 0%, #28c9b7 100%); }
        .icon-xtr  { background: linear-gradient(135deg, #ffcd6a 0%, #ffa85c 100%); }

        .header-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text);
            line-height: 1.3;
        }

        .header-subtitle {
            font-size: 15px;
            color: var(--hint);
            line-height: 1.4;
        }

        /* ===== XTR NOTE ===== */
        .xtr-note {
            font-size: 15px;
            color: var(--subtitle);
            line-height: 1.55;
            padding: 20px 20px 4px;
            text-align: center;
            animation: fadeInUp 0.3s ease 0.08s both;
        }

        /* ===== FORM ===== */
        .form-section {
            padding: 20px 16px 0;
            animation: fadeInUp 0.3s ease 0.1s both;
        }

        .field-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--hint);
            text-transform: uppercase;
            letter-spacing: 0.4px;
            padding: 0 4px 7px;
        }

        .field-group {
            background: var(--secondary-bg);
            border-radius: 12px;
            margin-bottom: 16px;
            overflow: hidden;
        }

        .field-input {
            width: 100%;
            padding: 13px 16px;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-size: 16px;
            font-family: inherit;
            -webkit-tap-highlight-color: transparent;
        }

        .field-input::placeholder {
            color: var(--hint);
        }

        .field-divider {
            height: 1px;
            background: var(--section-separator);
            margin: 0 16px;
        }

        .error-msg {
            font-size: 13px;
            color: #ff6b6b;
            padding: 3px 4px 10px;
            display: none;
        }

        /* ===== SUBMIT ===== */
        .submit-wrap {
            padding: 8px 16px 32px;
            animation: fadeInUp 0.3s ease 0.18s both;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--button);
            color: var(--button-text);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.15s;
            -webkit-tap-highlight-color: transparent;
        }

        .submit-btn:active  { transform: scale(0.97); opacity: 0.8; }
        .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        /* ===== SUCCESS OVERLAY ===== */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px 24px;
            text-align: center;
            z-index: 100;
        }

        .overlay.visible {
            display: flex;
            animation: fadeInUp 0.3s ease both;
        }

        .overlay-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6dd98e 0%, #35c759 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin-bottom: 20px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.25);
        }

        .overlay-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--text);
            line-height: 1.3;
        }

        .overlay-text {
            font-size: 15px;
            color: var(--subtitle);
            line-height: 1.55;
        }

        /* ===== BLOCKED ===== */
        .blocked {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 32px 24px;
            text-align: center;
            animation: fadeInUp 0.3s ease both;
        }

        .blocked-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6e7a84 0%, #4a545c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin-bottom: 20px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.25);
        }

        .blocked-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text);
            line-height: 1.3;
        }

        .blocked-text {
            font-size: 15px;
            color: var(--hint);
            line-height: 1.55;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }
    </style>
</head>
<body>
    <div class="app" id="app"></div>

    <!-- Success overlay -->
    <div class="overlay" id="successOverlay">
        <div class="overlay-icon">✅</div>
        <div class="overlay-title">Заявка отправлена</div>
        <div class="overlay-text">Заявка принята.<br>Среднее время обработки — до 24 часов.</div>
    </div>

    <script>
    (function() {
        const CURRENCY_XTR = 'XTR';

        function escapeHtml(str) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
            return str.replace(/[&<>"']/g, c => map[c]);
        }

        const tg = window.Telegram && window.Telegram.WebApp;

        if (tg) {
            tg.ready();
            tg.expand();
            tg.setHeaderColor('secondary_bg_color');
            tg.setBackgroundColor('bg_color');
        }

        if (!tg) {
            document.getElementById('app').innerHTML = `
                <div class="blocked">
                    <div class="blocked-icon">🔒</div>
                    <div class="blocked-title">Недоступно</div>
                    <div class="blocked-text">Откройте эту страницу через Telegram.</div>
                </div>`;
            return;
        }

        function haptic(type) {
            if (tg.HapticFeedback) {
                if (type === 'light')  tg.HapticFeedback.impactOccurred('light');
                if (type === 'error')  tg.HapticFeedback.notificationOccurred('error');
                if (type === 'success') tg.HapticFeedback.notificationOccurred('success');
            }
        }

        const params   = new URLSearchParams(window.location.search);
        const currency = params.get('currency') || '';
        const orderId  = params.get('order_id') || '';
        const isXtr    = currency === CURRENCY_XTR;

        const safeOrderId    = escapeHtml(orderId);
        const currencyLabel  = isXtr ? '⭐ Telegram Stars' : escapeHtml(currency || 'RUB');

        document.getElementById('app').innerHTML = `
            <div class="header-widget">
                <div class="header-icon ${isXtr ? 'icon-xtr' : 'icon-rub'}">${isXtr ? '⭐' : '💳'}</div>
                <div class="header-title">Оформление возврата</div>
                <div class="header-subtitle">Заказ #${safeOrderId} &middot; ${currencyLabel}</div>
            </div>

            ${isXtr ? `
                <div class="xtr-note">
                    Платёж был произведён в Telegram Stars.<br>
                    Нажмите кнопку, чтобы подать заявку&nbsp;&mdash;<br>
                    поддержка рассмотрит её в течение 24&nbsp;часов.
                </div>
                <div class="submit-wrap" style="padding-top:24px">
                    <button class="submit-btn" id="submitBtn">Подать заявку</button>
                </div>
            ` : `
                <div class="form-section">
                    <label class="field-label" for="requisites">Номер карты или СБП</label>
                    <div class="field-group">
                        <input class="field-input" id="requisites" type="text"
                            placeholder="4276 1234 5678 9012 или +79001234567"
                            aria-label="Номер карты или телефон СБП"
                            inputmode="text" autocomplete="off" />
                    </div>
                    <div class="error-msg" id="reqError">Введите номер карты или СБП</div>

                    <label class="field-label" for="bank">Название банка</label>
                    <div class="field-group">
                        <input class="field-input" id="bank" type="text"
                            placeholder="Сбербанк, Т-Банк, ВТБ..."
                            aria-label="Название банка"
                            autocomplete="off" />
                    </div>
                    <div class="error-msg" id="bankError">Введите название банка</div>
                </div>
                <div class="submit-wrap">
                    <button class="submit-btn" id="submitBtn">Отправить заявку</button>
                </div>
            `}
        `;

        document.getElementById('submitBtn').addEventListener('click', function () {
            const btn = this;
            const originalText = btn.textContent;

            if (!isXtr) {
                const req     = document.getElementById('requisites').value.trim();
                const bnk     = document.getElementById('bank').value.trim();
                const reqErr  = document.getElementById('reqError');
                const bankErr = document.getElementById('bankError');
                let valid = true;

                const stripped = req.replace(/[\s\-]/g, '');
                const isCard  = /^\d{16,19}$/.test(stripped);
                const isPhone = /^\+7\d{10}$/.test(req.replace(/[\s\-()]/g, ''));

                if (!req) {
                    reqErr.textContent = 'Введите номер карты или СБП';
                    reqErr.style.display = 'block'; valid = false;
                } else if (!isCard && !isPhone) {
                    reqErr.textContent = 'Введите номер карты (16–19 цифр) или телефон СБП (+7...)';
                    reqErr.style.display = 'block'; valid = false;
                } else {
                    reqErr.style.display = 'none';
                }

                if (!bnk) { bankErr.style.display = 'block'; valid = false; }
                else        bankErr.style.display = 'none';

                if (!valid) { haptic('error'); return; }

                try {
                    tg.sendData(JSON.stringify({ order_id: orderId, currency, requisites: req, bank: bnk }));
                } catch (e) {
                    haptic('error');
                    btn.textContent = 'Ошибка. Попробуйте ещё раз.';
                    setTimeout(() => { btn.textContent = originalText; }, 2000);
                    return;
                }
            } else {
                try {
                    tg.sendData(JSON.stringify({ order_id: orderId, currency: CURRENCY_XTR }));
                } catch (e) {
                    haptic('error');
                    btn.textContent = 'Ошибка. Попробуйте ещё раз.';
                    setTimeout(() => { btn.textContent = originalText; }, 2000);
                    return;
                }
            }

            btn.disabled = true;
            btn.textContent = 'Отправка...';
            haptic('success');
            document.getElementById('successOverlay').classList.add('visible');
            setTimeout(() => { if (tg && tg.close) tg.close(); }, 2500);
        });
    })();
    </script>
</body>
</html>
